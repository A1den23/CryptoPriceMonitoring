# Docker Compose configuration for Crypto Price Monitoring Bot

services:
  # 价格监控服务
  crypto-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-monitor
    restart: unless-stopped
    command: ["python", "monitor.py"]
    env_file:
      - .env
    volumes:
      # 持久化日志
      - crypto-logs:/app/logs
    networks:
      - crypto-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # 健康检查 - 在精简镜像中通过 /proc/1/cmdline 校验主进程
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; c=pathlib.Path('/proc/1/cmdline').read_bytes().replace(b'\\x00', b' '); sys.exit(0 if b'monitor.py' in c else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 安全选项
    security_opt:
      - no-new-privileges:true

  # Telegram 交互 Bot 服务
  crypto-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-bot
    restart: unless-stopped
    command: ["python", "bot.py"]
    env_file:
      - .env
    volumes:
      # 持久化日志
      - crypto-logs:/app/logs
    networks:
      - crypto-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # 健康检查 - 在精简镜像中通过 /proc/1/cmdline 校验主进程
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; c=pathlib.Path('/proc/1/cmdline').read_bytes().replace(b'\\x00', b' '); sys.exit(0 if b'bot.py' in c else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 安全选项
    security_opt:
      - no-new-privileges:true

networks:
  crypto-network:
    driver: bridge

volumes:
  crypto-logs:
