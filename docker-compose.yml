# Docker Compose configuration for Crypto Price Monitoring Bot

services:
  # 价格监控服务
  crypto-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-monitor
    restart: unless-stopped
    command: ["python", "monitor.py"]
    env_file:
      - .env
    volumes:
      # 持久化日志
      - ./logs:/app/logs
    networks:
      - crypto-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # 健康检查 - 检查 Python 进程是否运行
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep python.*monitor.py || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 安全选项
    security_opt:
      - no-new-privileges:true

  # Telegram 交互 Bot 服务
  crypto-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-bot
    restart: unless-stopped
    command: ["python", "bot.py"]
    env_file:
      - .env
    volumes:
      # 持久化日志
      - ./logs:/app/logs
    networks:
      - crypto-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # 健康检查 - 检查 Python 进程是否运行
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep python.*bot.py || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 安全选项
    security_opt:
      - no-new-privileges:true

networks:
  crypto-network:
    driver: bridge
